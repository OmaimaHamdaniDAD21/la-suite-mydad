services:
  - type: web
    name: mydad-api
    runtime: node
    buildCommand: cd packages/database && npx prisma generate && cd ../../apps/api && npm install
    startCommand: cd apps/api && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false
